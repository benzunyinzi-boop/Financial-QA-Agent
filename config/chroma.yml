collection_name : agent
persist_directory : chroma_db
k : 4
data_path : data/insurance
md5_hex_store : md5.txt
allow_knowledge_file_type : ["txt","pdf","md","pptx","png","jpg","jpeg"]

# PDF 加载模式：
#   text     - PyMuPDFLoader 纯文本（默认，兼容现有 chroma_db）
#   markdown - pymupdf4llm 输出 markdown，配合 MarkdownHeaderTextSplitter 按章节切分
#              章节信息会写入 metadata 的 section_h1/section_h2/section_h3
# 切换到 markdown 模式后，建议清空 chroma_db/ 重新构建索引以发挥效果
pdf_loader_mode : text

chunk_size : 600
chunk_overlap : 80
separators : ["\n\n","\n","。",".","?","？","!"," ",""]

knowledge_bases:
  public_kb:
    collection_name: insurance_public
    sub_dir: public
    description: "公开知识库：产品条款、FAQ、投保/理赔流程"
  internal_kb:
    collection_name: insurance_internal
    sub_dir: internal
    description: "内部知识库：客服SOP、话术、合规要点"
